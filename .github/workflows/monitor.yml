name: Japean uptime

on:
  schedule:
    # Toutes les 5 min, décalé de l'heure pile pour limiter le retard de file GitHub.
    - cron: '3-59/5 * * * *'
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Envoyer une alerte d'EXEMPLE dans Discord (démo du format)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: japean-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Vérification des pages Japean
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_ALERT: ${{ inputs.test_alert == true && '1' || '' }}
        run: node check.mjs

      - name: Persistance de l'état (anti-spam)
        if: always()
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "japean-monitor"
            git config user.email "monitor@japean.local"
            git add state.json
            git commit -m "state: maj statut monitoring"
            git push
          else
            echo "Aucun changement d'état."
          fi
